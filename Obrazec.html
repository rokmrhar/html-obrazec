<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Obrazec</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="style.css"/>
</head>
<body>
	<div class="glavni">
		<table>
			<tr>
				<td class="logo-field"><img src="/slike/posta.png/" alt="posta-logo"></td>
				<td class="naslov">Potrdilo o oddaji poštne pošiljke</td>
				<tr>
					<td div class="naslovnik">
						<table class="tnaslovnik">
							<tr>
								<td colspan="2">Naslovnik</td>
							</tr>
							<tr>
								<td><input type="text" name="ime" value="Janez"></td>
								<td><input type="text" name="priimek" value="Priimek"></td>
							</tr>
							<tr>
								<td colspan="2"><input type="text" value="naslov" name="naslov"> <input type="number" value="5000" name="postna-st"></td>
							</tr>
							<tr>
								<td colspan="2">Naziv pošte <input type="text" name="ime-poste"></td>
							</tr>
						</table>
					</td>
					<td>
					<table class="tstoritve">
						<tr>
							<td colspan="2">Storitve</td>
						</tr>
						<tr>
							<td><input type="checkbox" name="osebna-vročitev">Osebna vročitev</td>
							<td><input type="checkbox" name="povratnica">Povratnica</td>
						</tr>
						<tr>
							<td><input type="checkbox" name="prednostno">Prednostno</td>
							<td></td>
						</tr>
						<tr>
							<td></td>
							<td></td>
						</tr>
						<tr>
							<td colspan="2" class="odkupnina">Odkupnina <input type="number" name="odkupnina"> EUR</td>
						</tr>
						<tr>
							<td colspan="2">Vrednost <input type="number" name="vrednost"> EUR</td>
						</tr>
					</table>
					</td>
				</tr>
			</tr>
			<tr>
				<td id="prazno">Prazno</td>
				<td>
					<table class="tab2">
						<tr>
							<td>Sprejemna št. <input type="number" name="sprejemna"></td></td>
						</tr>
						<tr>
							<td>Masa <input type="number" name="masa"> g</td>
						</tr>
						<tr>
							<td>Poštnina <input type="number" name="postnina"> EUR</td>
						</tr>
						<tr>
							<td><script src='signature-pad.min.js' style="width: 40mm; height: 20mm;"></script></td>
						</tr>
					</table>
				</td>
			</tr>
		</table>
		<div class="oddaj"><input type="sumbit" name="oddaj"></div>
	</div>

</body>
</html>
