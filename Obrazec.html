<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Obrazec</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="style.css"/>
</head>
<body>
	<div class="glavni">
		<div class="head">
			<img src="http://rokmrhar.epizy.com/drustvo.svg" alt="logo-drustvo" style="float:left; height: 50px;">
			<img src="http://rokmrhar.epizy.com/operativa.svg?i=1" alt="logo-operativa" style="float:right; height: 50px;">
			<h2>PRIJAVNICA NA GASILSKI KROŽEK</h2>
		</div>
		<div class="koraki">
		
		</div>
		<div class="prijavnica">
			<div class="ime_priimek">
				<div class="ime">
					<label for="ime">Ime:</label>
					<input type="text" id="ime" name="ime" placeholder="Vpišite ime otroka">
				</div>
				<div class="priimek">
					<label for="priimek">Priimek:</label>
					<input type="text" id="priimek" name="priimek" placeholder="Vpišite priimek otroka">
				</div>
			</div>
			<label for="datum_rojstva">Datum rojstva:</label>
			<input type="date" id="dat_roj" name="dat_roj">
			<label for="naslov">Naslov stalnega prebivališča:</label>
			<input type="text" name="naslov" id="naslov">
			<label for="EMSO">EMŠO:</label>
			<input type="number" name="emso" id="emso" placeholder="Vpišite EMŠO">
			<label for="davcna">Davčna številka</label>
			<input type="number" name="davcna" id="davcna" placeholder="Vpišite davčno številko">
			<div class="ime_priimek">
				<div class="ime">
					<label for="ime_starsa">Ime:</label>
					<input type="text" id="ime_starsa" name="ime_starsa" placeholder="Vpišite ime starša/zakonitega zastopnika">
				</div>
				<div class="priimek">
					<label for="priimek_starsa">Priimek:</label>
					<input type="text" id="priimek_starsa" name="priimek_starsa" placeholder="Vpišite priimek starša/zakonitega zastopnika">
				</div>
			</div>
			<label for="telefonska">Telefonska številka starša/zakonitega zastopnika</label>
			<input type="number" name="telefonska" id="telefonska" placeholder="Vpišite telefonsko številko starša/zakonitega zastopnika">
		</div>
	</div>
</body>
</html>
